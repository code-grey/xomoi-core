syntax = "proto3";

package v1;

option go_package = "github.com/code-grey/xomoi-core/internal/core/proto";

// DataType defines the expected value type for a specific sensor tag.
enum DataType {
  DATA_TYPE_UNSPECIFIED = 0;
  DATA_TYPE_FLOAT = 1;
  DATA_TYPE_INT = 2;
  DATA_TYPE_BOOL = 3;
  DATA_TYPE_STRING = 4;
  DATA_TYPE_BYTES = 5;
  DATA_TYPE_VECTOR3 = 6;
  DATA_TYPE_JSON = 7;
}

// Vector3 represents a 3D coordinate or vector (GPS, IMU, etc.)
message Vector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}
