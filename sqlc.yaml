version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/repository/sqlite/query.sql"
    schema: "internal/repository/sqlite/migrations"
    gen:
      go:
        package: "dbgen"
        out: "internal/repository/sqlite/dbgen"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
